name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Extract ZIP
      run: |
        echo "📦 Looking for ZIP files..."
        ls -la *.zip 2>/dev/null || echo "⚠️ No ZIP found"
        for zipfile in *.zip; do
          if [ -f "$zipfile" ]; then
            echo "✅ Extracting $zipfile..."
            unzip -o "$zipfile" -d ./
          fi
        done
        echo "📂 Files after extract:"
        ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/
        echo "y" | cmdline-tools/latest/bin/sdkmanager --licenses
        echo "y" | cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Set ANDROID_HOME
      run: echo "ANDROID_HOME=~/android-sdk" >> $GITHUB_ENV

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
